name: Publish Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - release_request.json

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build release artifacts
        shell: pwsh
        run: .\build_release.ps1

      - name: Collect release metadata
        id: meta
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
              throw "VERSION is empty."
          }

          $tag = "v$version"
          $mainExe = Join-Path $PWD 'dist\InvoiceExtractor.exe'
          if (-not (Test-Path $mainExe)) {
              throw "Missing dist\InvoiceExtractor.exe after build."
          }

          $sha256 = (Get-FileHash -Algorithm SHA256 $mainExe).Hash.ToLowerInvariant()
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/InvoiceExtractor.exe"
          $requestNotes = ''
          $requestPath = Join-Path $PWD 'release_request.json'
          if (Test-Path $requestPath) {
              try {
                  $request = Get-Content -Path $requestPath -Raw | ConvertFrom-Json
                  $requestNotes = [string]($request.notes)
              } catch {
                  throw "release_request.json is not valid JSON."
              }
          }

          $notes = $requestNotes.Trim()
          if ([string]::IsNullOrWhiteSpace($notes)) {
              $notes = "Invoice Extractor $version"
          }

          $notesPath = Join-Path $env:RUNNER_TEMP 'release-notes.txt'
          Set-Content -Path $notesPath -Value $notes -Encoding UTF8

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "title=Invoice Extractor v$version" >> $env:GITHUB_OUTPUT
          "sha256=$sha256" >> $env:GITHUB_OUTPUT
          "download_url=$downloadUrl" >> $env:GITHUB_OUTPUT
          "notes_file=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create `
            "${{ steps.meta.outputs.tag }}" `
            "dist\InvoiceExtractor.exe" `
            --repo "${{ github.repository }}" `
            --title "${{ steps.meta.outputs.title }}" `
            --notes-file "${{ steps.meta.outputs.notes_file }}"

      - name: Read published release info
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $release = gh release view `
            "${{ steps.meta.outputs.tag }}" `
            --repo "${{ github.repository }}" `
            --json publishedAt,url | ConvertFrom-Json

          "published_at=$($release.publishedAt)" >> $env:GITHUB_OUTPUT
          "release_url=$($release.url)" >> $env:GITHUB_OUTPUT

      - name: Update release manifest
        shell: pwsh
        run: |
          $notes = (Get-Content -Path "${{ steps.meta.outputs.notes_file }}" -Raw).Trim()
          $manifest = [ordered]@{
              version      = "${{ steps.meta.outputs.version }}"
              download_url = "${{ steps.meta.outputs.download_url }}"
              sha256       = "${{ steps.meta.outputs.sha256 }}"
              notes        = $notes
              published_at = "${{ steps.release.outputs.published_at }}"
          }

          $manifest | ConvertTo-Json | Set-Content -Path 'docs\release.json' -Encoding UTF8

      - name: Commit updated release manifest
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/release.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
              Write-Host "docs/release.json did not change."
              exit 0
          }
          git commit -m "Publish release manifest for v${{ steps.meta.outputs.version }}"
          git push

      - name: Release summary
        shell: pwsh
        run: |
          Write-Host "Release published: ${{ steps.release.outputs.release_url }}"
          Write-Host "Asset URL: ${{ steps.meta.outputs.download_url }}"
          Write-Host "SHA-256:  ${{ steps.meta.outputs.sha256 }}"
